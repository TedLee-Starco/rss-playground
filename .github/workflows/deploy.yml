name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  get-changed-folder:
    name: Get Changed Folder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      py-any-changed: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.get-changed.outputs.py_any_changed }}
      ts-any-changed: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.get-changed.outputs.js_any_changed }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Get Changed Folder
      uses: tj-actions/changed-files@v46
      id: get-changed
      with:
        dir_names: true
        dir_names_max_depth: 1
        dir_names_exclude_current_dir: true
        matrix: true
        files_yaml: |
          py:
            - scripts/**
          ts:
            - src/**
  pycheck:
    runs-on: ubuntu-latest
    needs: get-changed-folder
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.get-changed-folder.outputs.py-any-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: kishaningithub/setup-python-amazon-linux@v1
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: uv sync
        run: uv sync
      - name: Run Prek
        uses: j178/prek-action@v1
        with:
          extra_args: --from-ref origin/${{ github.base_ref }} --to-ref HEAD
        env:
          SECRET_KEY: insecure-key-for-testing
  tscheck:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.get-changed-folder.outputs.ts-any-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    needs: [pycheck, tscheck]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
