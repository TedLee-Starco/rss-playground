[[repos]]
  repo = "https://github.com/pre-commit/pre-commit-hooks"
  rev = "v6.0.0"
  hooks = [
    { id = "check-yaml" },
    { id = "end-of-file-fixer" },
    { id = "trailing-whitespace" },
    { id = "detect-private-key" },
    { id = "debug-statements" },
    { id = "check-ast" }
  ]

[[repos]]
  repo = "https://github.com/astral-sh/ruff-pre-commit"
  rev = "v0.11.5"
  hooks = [
    { id = "ruff", args = ["--fix"] }
  ]

[[repos]]
  repo = "https://github.com/psf/black"
  rev = "25.1.0"
  hooks = [
    { id = "black", name = "black", args = ["--config=pyproject.toml"] }
  ]

[[repos]]
  repo = "local"
  hooks = [
    {
      id = "tsc",
      name = "ts type check",
      entry = "npx tsc --noEmit",
      language = "system",
      files = "\\.ts$",
      pass_filenames = false
    }
  ]
